<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SaaSテスター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',sans-serif;background:#f3f4f6;padding:16px;}
input,button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const AC = "#c84b00";

const TESTS = [
  {group:"👤 管理者登録",id:"b01",label:"管理者アカウントの新規登録"},
  {id:"b02",label:"会社レコードが作成される"},
  {id:"b03",label:"管理者がmembersにcompany_id付きで登録される"},
  {group:"💾 設定保存",id:"b04",label:"会社情報を保存できる"},
  {id:"b05",label:"ログアウト後も設定データがDBに残っている"},
  {id:"b06",label:"再ログイン後に設定が正しく読み込まれる"},
  {group:"🔑 招待コード・スタッフ",id:"b07",label:"招待コードを発行できる"},
  {id:"b08",label:"スタッフアカウントを招待コードで登録できる"},
  {id:"b09",label:"スタッフが正しいcompany_idで登録されている"},
  {group:"🔒 データ分離（完全テスト）",id:"b10",label:"管理者は自社の設定だけ見える"},
  {id:"b11",label:"スタッフは自社のデータだけ見える"},
  {id:"b12",label:"別会社Bのデータを作成する"},
  {id:"b13",label:"会社Aから会社Bの設定が見えない"},
  {id:"b14",label:"会社Aから会社Bのメンバーが見えない"},
  {group:"🗑 後片付け",id:"b15",label:"テストデータを全て削除する"},
];

function App(){
  const [supabaseUrl,setSupabaseUrl]=useState("");
  const [supabaseKey,setSupabaseKey]=useState("");
  const [adminEmail,setAdminEmail]=useState("");
  const [adminPass,setAdminPass]=useState("testpass123");
  const [staffEmail,setStaffEmail]=useState("");
  const [staffPass,setStaffPass]=useState("testpass456");
  const [companyName,setCompanyName]=useState("テスト株式会社");
  const [results,setResults]=useState({});
  const [logs,setLogs]=useState([]);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);

  const passCount=Object.values(results).filter(r=>r==="pass").length;
  const failCount=Object.values(results).filter(r=>r==="fail").length;

  function addLog(msg,type){
    setLogs(p=>[...p,{text:(type==="ok"?"✓ ":type==="error"?"✗ ":type==="warn"?"⚠ ":"  ")+msg,type}]);
  }
  function setStatus(id,status,msg,type){
    setResults(p=>({...p,[id]:status}));
    if(msg)addLog(msg,type||"info");
  }

  async function api(method,path,body){
    const h={"apikey":supabaseKey,"Authorization":"Bearer "+supabaseKey,"Content-Type":"application/json","Prefer":"return=representation"};
    const res=await fetch(supabaseUrl+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
    const d=await res.json().catch(()=>({}));
    return{data:res.ok?(Array.isArray(d)?d:d):null,error:res.ok?null:d};
  }
  async function authSignUp(e,p){
    const res=await fetch(supabaseUrl+"/auth/v1/signup",{method:"POST",headers:{"apikey":supabaseKey,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
    const d=await res.json();return res.ok?{error:null}:{error:d.error||d};
  }
  async function authSignIn(e,p){
    const res=await fetch(supabaseUrl+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":supabaseKey,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
    const d=await res.json();return res.ok?{error:null}:{error:d.error_description||"失敗"};
  }

  async function runTests(){
    if(!supabaseUrl||!supabaseKey){alert("Supabase URLとKeyを入力してください");return;}
    if(!adminEmail||!staffEmail){alert("メールアドレスを入力してください");return;}
    if(adminEmail===staffEmail){alert("管理者とスタッフは別のアドレスにしてください");return;}
    setRunning(true);setDone(false);setResults({});setLogs([]);
    addLog("=== テスト開始 ===");
    let cid=null;

    setStatus("b01","running");
    const{data:ec}=await api("GET","/rest/v1/companies?owner_email=eq."+adminEmail+"&select=id");
    if(ec&&ec.length>0){setStatus("b01","fail","このメールはすでに登録済みです","error");finish();return;}
    const{error:se}=await authSignUp(adminEmail,adminPass);
    if(se){setStatus("b01","fail","登録失敗: "+JSON.stringify(se),"error");finish();return;}
    setStatus("b01","pass","管理者登録成功","ok");

    setStatus("b02","running");
    const{data:co,error:ce}=await api("POST","/rest/v1/companies",{name:companyName,owner_email:adminEmail});
    if(ce||!co){setStatus("b02","fail","会社作成失敗","error");finish();return;}
    cid=Array.isArray(co)?co[0].id:co.id;
    setStatus("b02","pass","会社作成成功 id="+cid,"ok");

    setStatus("b03","running");
    const{error:me}=await api("POST","/rest/v1/members",{email:adminEmail,role:"admin",company_id:cid,invited_by:adminEmail});
    if(me){setStatus("b03","fail","members登録失敗","error");finish();return;}
    const{data:ms}=await api("GET","/rest/v1/members?email=eq."+adminEmail+"&select=company_id,role");
    const m=ms&&ms[0];
    if(!m||String(m.company_id)!==String(cid)){setStatus("b03","fail","company_id不一致","error");finish();return;}
    setStatus("b03","pass","company_id="+m.company_id+" OK","ok");

    setStatus("b04","running");
    const{error:sve}=await api("POST","/rest/v1/company_settings",{name:companyName,zipcode:"123-4567",address:"東京都テスト区",tel:"03-1234-5678",invoice:"T1234567890123",bank_name:"テスト銀行",bank_branch:"テスト支店",bank_type:"普通",bank_no:"1234567",bank_holder:"テスト",tax_rate:10,company_id:cid});
    if(sve){setStatus("b04","fail","設定保存失敗: "+JSON.stringify(sve),"error");finish();return;}
    setStatus("b04","pass","設定保存成功","ok");

    setStatus("b05","running");
    const{data:sc}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=name");
    if(!sc||sc.length===0){setStatus("b05","fail","データが消えています","error");finish();return;}
    setStatus("b05","pass","DBにデータ残存OK","ok");

    setStatus("b06","running");
    const{error:le}=await authSignIn(adminEmail,adminPass);
    if(le){setStatus("b06","fail","再ログイン失敗: "+le,"error");finish();return;}
    setStatus("b06","pass","再ログイン成功","ok");

    setStatus("b07","running");
    const ic="STAFF-TEST1";
    const{error:ice}=await api("POST","/rest/v1/invite_codes",{code:ic,role:"staff",used:false,created_by:adminEmail,company_id:cid});
    if(ice){setStatus("b07","fail","招待コード発行失敗","error");finish();return;}
    setStatus("b07","pass","招待コード発行成功","ok");

    setStatus("b08","running");
    const{error:sse}=await authSignUp(staffEmail,staffPass);
    if(sse){setStatus("b08","fail","スタッフ登録失敗","error");finish();return;}
    const{data:cd}=await api("GET","/rest/v1/invite_codes?code=eq."+ic+"&select=*");
    const codeData=cd&&cd[0];
    const{error:sme}=await api("POST","/rest/v1/members",{email:staffEmail,role:codeData.role,company_id:codeData.company_id,invited_by:codeData.created_by});
    if(sme){setStatus("b08","fail","スタッフmembers登録失敗","error");finish();return;}
    setStatus("b08","pass","スタッフ登録成功","ok");

    setStatus("b09","running");
    const{data:sm}=await api("GET","/rest/v1/members?email=eq."+staffEmail+"&select=company_id,role");
    const staffMem=sm&&sm[0];
    if(!staffMem||String(staffMem.company_id)!==String(cid)){setStatus("b09","fail","スタッフcompany_id不正","error");finish();return;}
    setStatus("b09","pass","スタッフcompany_id="+staffMem.company_id+" OK","ok");

    setStatus("b10","running");
    const{data:mys}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=*");
    if(!mys||mys.length===0){setStatus("b10","fail","自社設定が読み込めません","error");finish();return;}
    setStatus("b10","pass","自社設定のみ取得OK","ok");

    setStatus("b11","running");
    const{data:staffDocs}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=company_id");
    if(staffDocs&&staffDocs.every(s=>String(s.company_id)===String(cid))){setStatus("b11","pass","スタッフは自社データのみ取得OK","ok");}
    else{setStatus("b11","fail","スタッフに他社データが見えています","error");finish();return;}

    // 別会社Bを作成してデータ分離をテスト
    setStatus("b12","running");
    const companyBEmail="testB_"+Date.now()+"@test.com";
    const{data:coB,error:ceBErr}=await api("POST","/rest/v1/companies",{name:"テスト会社B",owner_email:companyBEmail});
    if(ceBErr||!coB){setStatus("b12","fail","会社B作成失敗","error");finish();return;}
    const cidB=Array.isArray(coB)?coB[0].id:coB.id;
    const{error:svB}=await api("POST","/rest/v1/company_settings",{name:"会社Bの設定",zipcode:"000-0000",address:"大阪府テスト市",tel:"06-0000-0000",invoice:"T9999999999999",bank_name:"B銀行",bank_branch:"B支店",bank_type:"普通",bank_no:"9999999",bank_holder:"テストB",tax_rate:10,company_id:cidB});
    if(svB){setStatus("b12","fail","会社B設定保存失敗","error");finish();return;}
    setStatus("b12","pass","別会社Bのデータ作成成功 id="+cidB,"ok");

    setStatus("b13","running");
    const{data:crossCheck}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=company_id");
    const leaked=crossCheck&&crossCheck.some(s=>String(s.company_id)===String(cidB));
    if(leaked){setStatus("b13","fail","会社Aから会社Bの設定が見えています！データが混ざっています","error");finish();return;}
    setStatus("b13","pass","会社Aから会社Bの設定は見えない ✓","ok");

    setStatus("b14","running");
    const{data:memberCrossCheck}=await api("GET","/rest/v1/members?company_id=eq."+cid+"&select=company_id");
    const memberLeaked=memberCrossCheck&&memberCrossCheck.some(s=>String(s.company_id)===String(cidB));
    if(memberLeaked){setStatus("b14","fail","会社Aから会社Bのメンバーが見えています","error");finish();return;}
    setStatus("b14","pass","会社Aから会社Bのメンバーは見えない ✓","ok");

    setStatus("b15","running");
    await api("DELETE","/rest/v1/company_settings?company_id=eq."+cid);
    await api("DELETE","/rest/v1/company_settings?company_id=eq."+cidB);
    await api("DELETE","/rest/v1/invite_codes?company_id=eq."+cid);
    await api("DELETE","/rest/v1/members?email=eq."+adminEmail);
    await api("DELETE","/rest/v1/members?email=eq."+staffEmail);
    await api("DELETE","/rest/v1/companies?id=eq."+cid);
    await api("DELETE","/rest/v1/companies?id=eq."+cidB);
    setStatus("b15","pass","テストデータ全削除完了","ok");

    setRunning(false);setDone(true);
    addLog("\n=== テスト完了 ===");
  }

  function finish(){setRunning(false);setDone(true);addLog("\n=== テスト完了（エラーあり）=== ");}

  return (
    <div style={{background:"#f3f4f6",minHeight:"100vh",padding:16,fontFamily:"sans-serif"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{fontWeight:900,fontSize:20,marginBottom:4}}>🧪 SaaSテスター</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>情報を入力してテストを実行してください</div>

        <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,borderBottom:"1px solid #f3f4f6",paddingBottom:8}}>⚙️ テスト設定</div>
          {[
            {label:"Supabase URL",val:supabaseUrl,set:setSupabaseUrl,ph:"https://xxx.supabase.co"},
            {label:"Supabase Anon Key",val:supabaseKey,set:setSupabaseKey,ph:"eyJ..."},
            {label:"管理者テスト用メール",val:adminEmail,set:setAdminEmail,ph:"test_admin@example.com"},
            {label:"管理者パスワード",val:adminPass,set:setAdminPass,type:"password"},
            {label:"スタッフテスト用メール",val:staffEmail,set:setStaffEmail,ph:"test_staff@example.com"},
            {label:"スタッフパスワード",val:staffPass,set:setStaffPass,type:"password"},
            {label:"テスト用会社名",val:companyName,set:setCompanyName},
          ].map((f,i)=>(
            <div key={i} style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>{f.label}</div>
              <input type={f.type||"text"} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph||""}
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:0}}/>
            </div>
          ))}
        </div>

        {Object.keys(results).length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            {[
              {n:passCount,label:"✅ 合格",bg:"#dcfce7",c:"#16a34a"},
              {n:failCount,label:"❌ 失敗",bg:"#fee2e2",c:"#ef4444"},
              {n:Object.keys(results).length,label:"合計",bg:"#f3f4f6",c:"#6b7280"},
            ].map((s,i)=>(
              <div key={i} style={{background:s.bg,borderRadius:8,padding:12,textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:s.c}}>{s.n}</div>
                <div style={{fontSize:11,color:s.c}}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,borderBottom:"1px solid #f3f4f6",paddingBottom:8}}>📋 テスト項目（15項目）</div>
          {TESTS.map((t,i)=>(
            <div key={i}>
              {t.group&&<div style={{fontSize:10,fontWeight:700,color:"#9ca3af",padding:"8px 0 3px",letterSpacing:".08em"}}>{t.group}</div>}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f9fafb",fontSize:13}}>
                <div style={{
                  width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,
                  background:results[t.id]==="pass"?"#dcfce7":results[t.id]==="fail"?"#fee2e2":results[t.id]==="running"?"#fef3c7":"#f3f4f6",
                  color:results[t.id]==="pass"?"#16a34a":results[t.id]==="fail"?"#ef4444":results[t.id]==="running"?"#d97706":"#9ca3af",
                }}>
                  {results[t.id]==="pass"?"✓":results[t.id]==="fail"?"✗":results[t.id]==="running"?"…":"–"}
                </div>
                <span>{t.label}</span>
              </div>
            </div>
          ))}
        </div>

        <button onClick={runTests} disabled={running}
          style={{background:AC,color:"#fff",border:"none",padding:13,borderRadius:6,fontSize:14,fontWeight:700,cursor:running?"not-allowed":"pointer",width:"100%",opacity:running?.6:1,marginBottom:10}}>
          {running?"テスト実行中...":"▶ テストを実行する"}
        </button>

        {done&&(
          <div style={{background:failCount===0?"#dcfce7":"#fee2e2",color:failCount===0?"#16a34a":"#ef4444",borderRadius:8,padding:16,textAlign:"center",fontWeight:700,fontSize:16,marginBottom:14}}>
            {failCount===0?`🎉 全${passCount}項目合格！リリースOKです`:`⚠️ ${failCount}件失敗。修正が必要です`}
          </div>
        )}

        {logs.length>0&&(
          <div style={{background:"#111",padding:14,borderRadius:8,fontSize:11,fontFamily:"monospace",maxHeight:220,overflowY:"auto",lineHeight:1.7}}>
            {logs.map((l,i)=>(
              <div key={i} style={{color:l.type==="error"?"#ef4444":l.type==="ok"?"#60a5fa":l.type==="warn"?"#f59e0b":"#10b981"}}>{l.text}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
