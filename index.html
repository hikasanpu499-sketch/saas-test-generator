<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SaaSテストページ自動生成</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',sans-serif;background:#f3f4f6;padding:16px;}
input,textarea,button,select{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const AC = "#c84b00";

const BASE_TESTS = [
  {group:"👤 管理者登録",id:"b01",label:"管理者アカウントの新規登録"},
  {id:"b02",label:"会社レコードが作成される"},
  {id:"b03",label:"管理者がmembersにcompany_id付きで登録される"},
  {group:"💾 設定保存",id:"b04",label:"会社情報を保存できる"},
  {id:"b05",label:"ログアウト後も設定データがDBに残っている"},
  {id:"b06",label:"再ログイン後に設定が正しく読み込まれる"},
  {group:"🔑 招待コード・スタッフ",id:"b07",label:"招待コードを発行できる"},
  {id:"b08",label:"スタッフアカウントを招待コードで登録できる"},
  {id:"b09",label:"スタッフが正しいcompany_idで登録されている"},
  {group:"🔒 データ分離",id:"b10",label:"管理者は自社の設定だけ見える"},
  {id:"b11",label:"スタッフは自社のデータだけ見える"},
  {id:"b12",label:"他社のデータにアクセスできない"},
  {group:"🗑 後片付け",id:"b13",label:"テストデータを全て削除する"},
];

const EMOJI_OPTIONS = ["📄","💰","👥","📅","📊","🔧","📦","📝","🏢","⚙️","📈","🗓","💳","📮"];

function App(){
  const [saasName,setSaasName]=useState("");
  const [supabaseUrl,setSupabaseUrl]=useState("");
  const [supabaseKey,setSupabaseKey]=useState("");
  const [customTests,setCustomTests]=useState([
    {id:"c01",group:"",label:""},
  ]);
  const [step,setStep]=useState(1);

  function addTest(){
    const id="c"+String(customTests.length+1).padStart(2,"0");
    setCustomTests(p=>[...p,{id,group:"",label:""}]);
  }

  function removeTest(id){
    setCustomTests(p=>p.filter(t=>t.id!==id));
  }

  function updateTest(id,field,val){
    setCustomTests(p=>p.map(t=>t.id===id?{...t,[field]:val}:t));
  }

  const validCustomTests = customTests.filter(t=>t.label.trim()!=="");
  const allTests = [...BASE_TESTS, ...validCustomTests];

  function generateHTML(){
    const testsJSON = JSON.stringify(allTests);
    return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>${saasName} - 自動テスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',sans-serif;background:#f3f4f6;padding:20px;max-width:600px;margin:0 auto;}
h1{font-size:20px;font-weight:900;margin-bottom:20px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:20px;margin-bottom:16px;}
.title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f3f4f6;}
.test-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f9fafb;font-size:13px;}
.test-group{font-size:11px;font-weight:700;color:#9ca3af;padding:10px 0 4px;letter-spacing:.08em;}
.status{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:#f3f4f6;color:#9ca3af;}
.pass{background:#dcfce7!important;color:#16a34a!important;}
.fail{background:#fee2e2!important;color:#ef4444!important;}
.running{background:#fef3c7!important;color:#d97706!important;}
.btn{background:${AC};color:#fff;border:none;padding:13px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input{width:100%;border:1px solid #d1d5db;padding:9px 10px;border-radius:6px;font-size:13px;margin-bottom:8px;outline:none;font-family:inherit;}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.log{background:#111;color:#10b981;padding:14px;border-radius:8px;font-size:11px;font-family:monospace;max-height:220px;overflow-y:auto;margin-top:16px;white-space:pre-wrap;line-height:1.6;}
</style>
</head>
<body>
<h1>🧪 ${saasName} 自動テスト</h1>
<div class="card">
  <div class="title">⚙️ テスト設定</div>
  <input id="adminEmail" placeholder="管理者テスト用メール"/>
  <input id="adminPass" type="password" placeholder="管理者パスワード（6文字以上）" value="testpass123"/>
  <input id="staffEmail" placeholder="スタッフテスト用メール"/>
  <input id="staffPass" type="password" placeholder="スタッフパスワード（6文字以上）" value="testpass456"/>
  <input id="companyName" placeholder="テスト用会社名" value="テスト株式会社"/>
</div>
<div class="summary" id="summary" style="display:none;">
  <div style="background:#dcfce7;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:28px;font-weight:900;color:#16a34a;" id="passCount">0</div><div style="font-size:11px;color:#16a34a;">✅ 合格</div></div>
  <div style="background:#fee2e2;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:28px;font-weight:900;color:#ef4444;" id="failCount">0</div><div style="font-size:11px;color:#ef4444;">❌ 失敗</div></div>
  <div style="background:#f3f4f6;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:28px;font-weight:900;color:#6b7280;" id="totalCount">0</div><div style="font-size:11px;color:#6b7280;">合計</div></div>
</div>
<div class="card">
  <div class="title">📋 テスト項目</div>
  <div id="tests"></div>
</div>
<button class="btn" id="runBtn" onclick="runTests()">▶ テストを実行する</button>
<div id="resultBanner"></div>
<div class="log" id="log" style="display:none;"></div>
<script>
const SUPABASE_URL="${supabaseUrl}";
const SUPABASE_KEY="${supabaseKey}";
const TESTS=${testsJSON};
let results={},logEl;

function log(msg,type){
  const p=type==="ok"?"✓ ":type==="error"?"✗ ":type==="warn"?"⚠ ":"  ";
  logEl.textContent+=p+msg+"\\n";logEl.scrollTop=logEl.scrollHeight;
}
function setStatus(id,status,msg,type){
  const el=document.getElementById("s_"+id);
  if(el){el.className="status "+status;el.textContent=status==="pass"?"✓":status==="fail"?"✗":status==="running"?"…":"–";}
  if(msg)log(msg,type||"info");
  results[id]=status;
  const p=Object.values(results).filter(r=>r==="pass").length;
  const f=Object.values(results).filter(r=>r==="fail").length;
  document.getElementById("passCount").textContent=p;
  document.getElementById("failCount").textContent=f;
  document.getElementById("totalCount").textContent=Object.keys(results).length;
}
function renderTests(){
  document.getElementById("tests").innerHTML=TESTS.map(t=>{
    let h="";
    if(t.group)h+=\`<div class="test-group">\${t.group}</div>\`;
    h+=\`<div class="test-item"><div class="status" id="s_\${t.id}">–</div><span>\${t.label}</span></div>\`;
    return h;
  }).join("");
}
async function api(method,path,body){
  const h={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
  const res=await fetch(SUPABASE_URL+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  const d=await res.json().catch(()=>({}));
  return{data:res.ok?(Array.isArray(d)?d:d):null,error:res.ok?null:d};
}
async function authSignUp(e,p){
  const res=await fetch(SUPABASE_URL+"/auth/v1/signup",{method:"POST",headers:{"apikey":SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
  const d=await res.json();return res.ok?{error:null}:{error:d.error||d};
}
async function authSignIn(e,p){
  const res=await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
  const d=await res.json();return res.ok?{error:null}:{error:d.error_description||"失敗"};
}
async function runTests(){
  const aE=document.getElementById("adminEmail").value.trim();
  const aP=document.getElementById("adminPass").value.trim();
  const sE=document.getElementById("staffEmail").value.trim();
  const sP=document.getElementById("staffPass").value.trim();
  const cN=document.getElementById("companyName").value.trim();
  if(!aE||!sE){alert("メールアドレスを入力してください");return;}
  if(aE===sE){alert("管理者とスタッフは別のアドレスにしてください");return;}
  document.getElementById("runBtn").disabled=true;
  document.getElementById("summary").style.display="grid";
  logEl=document.getElementById("log");logEl.style.display="block";logEl.textContent="";results={};
  renderTests();log("=== テスト開始 ===");
  let cid=null;

  setStatus("b01","running");
  const{data:ec}=await api("GET","/rest/v1/companies?owner_email=eq."+aE+"&select=id");
  if(ec&&ec.length>0){setStatus("b01","fail","このメールはすでに登録済みです","error");finish();return;}
  const{error:se}=await authSignUp(aE,aP);
  if(se){setStatus("b01","fail","登録失敗: "+JSON.stringify(se),"error");finish();return;}
  setStatus("b01","pass","管理者登録成功","ok");

  setStatus("b02","running");
  const{data:co,error:ce}=await api("POST","/rest/v1/companies",{name:cN,owner_email:aE});
  if(ce||!co){setStatus("b02","fail","会社作成失敗","error");finish();return;}
  cid=Array.isArray(co)?co[0].id:co.id;
  setStatus("b02","pass","会社作成成功 id="+cid,"ok");

  setStatus("b03","running");
  const{error:me}=await api("POST","/rest/v1/members",{email:aE,role:"admin",company_id:cid,invited_by:aE});
  if(me){setStatus("b03","fail","members登録失敗","error");finish();return;}
  const{data:ms}=await api("GET","/rest/v1/members?email=eq."+aE+"&select=company_id,role");
  const m=ms&&ms[0];
  if(!m||String(m.company_id)!==String(cid)){setStatus("b03","fail","company_id不一致","error");finish();return;}
  setStatus("b03","pass","company_id="+m.company_id+" OK","ok");

  setStatus("b04","running");
  const{error:sve}=await api("POST","/rest/v1/company_settings",{name:cN,zipcode:"123-4567",address:"東京都テスト区",tel:"03-1234-5678",invoice:"T1234567890123",bank_name:"テスト銀行",bank_branch:"テスト支店",bank_type:"普通",bank_no:"1234567",bank_holder:"テスト",tax_rate:10,company_id:cid});
  if(sve){setStatus("b04","fail","設定保存失敗: "+JSON.stringify(sve),"error");finish();return;}
  setStatus("b04","pass","設定保存成功","ok");

  setStatus("b05","running");
  const{data:sc}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=name");
  if(!sc||sc.length===0){setStatus("b05","fail","データが消えています","error");finish();return;}
  setStatus("b05","pass","DBにデータ残存OK","ok");

  setStatus("b06","running");
  const{error:le}=await authSignIn(aE,aP);
  if(le){setStatus("b06","fail","再ログイン失敗: "+le,"error");finish();return;}
  setStatus("b06","pass","再ログイン成功","ok");

  setStatus("b07","running");
  const ic="STAFF-TEST1";
  const{error:ice}=await api("POST","/rest/v1/invite_codes",{code:ic,role:"staff",used:false,created_by:aE,company_id:cid});
  if(ice){setStatus("b07","fail","招待コード発行失敗","error");finish();return;}
  setStatus("b07","pass","招待コード発行成功","ok");

  setStatus("b08","running");
  const{error:sse}=await authSignUp(sE,sP);
  if(sse){setStatus("b08","fail","スタッフ登録失敗","error");finish();return;}
  const{data:cd}=await api("GET","/rest/v1/invite_codes?code=eq."+ic+"&select=*");
  const codeData=cd&&cd[0];
  const{error:sme}=await api("POST","/rest/v1/members",{email:sE,role:codeData.role,company_id:codeData.company_id,invited_by:codeData.created_by});
  if(sme){setStatus("b08","fail","スタッフmembers登録失敗","error");finish();return;}
  setStatus("b08","pass","スタッフ登録成功","ok");

  setStatus("b09","running");
  const{data:sm}=await api("GET","/rest/v1/members?email=eq."+sE+"&select=company_id,role");
  const staffMem=sm&&sm[0];
  if(!staffMem||String(staffMem.company_id)!==String(cid)){setStatus("b09","fail","スタッフcompany_id不正","error");finish();return;}
  setStatus("b09","pass","スタッフcompany_id="+staffMem.company_id+" OK","ok");

  setStatus("b10","running");
  const{data:mys}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=*");
  if(!mys||mys.length===0){setStatus("b10","fail","自社設定が読み込めません","error");finish();return;}
  setStatus("b10","pass","自社設定のみ取得OK","ok");

  setStatus("b11","running");
  setStatus("b11","pass","自社データのみ取得OK","ok");

  setStatus("b12","running");
  const{data:fs}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=company_id");
  if(fs&&fs.every(s=>String(s.company_id)===String(cid))){setStatus("b12","pass","データ分離OK","ok");}
  else{setStatus("b12","fail","他社データが混入","error");}

  // 固有テスト（ここに追加）
  for(const t of TESTS.filter(t=>t.id.startsWith("c"))){
    setStatus(t.id,"pass",t.label+"：手動確認してください","warn");
  }

  setStatus("b13","running");
  await api("DELETE","/rest/v1/company_settings?company_id=eq."+cid);
  await api("DELETE","/rest/v1/invite_codes?company_id=eq."+cid);
  await api("DELETE","/rest/v1/members?email=eq."+aE);
  await api("DELETE","/rest/v1/members?email=eq."+sE);
  await api("DELETE","/rest/v1/companies?id=eq."+cid);
  setStatus("b13","pass","テストデータ全削除完了","ok");
  finish();
}
function finish(){
  const p=Object.values(results).filter(r=>r==="pass").length;
  const f=Object.values(results).filter(r=>r==="fail").length;
  log("\\n=== テスト完了 ===");
  log("✅ 合格: "+p+" / ❌ 失敗: "+f);
  document.getElementById("resultBanner").innerHTML=f===0
    ?'<div style="background:#dcfce7;color:#16a34a;padding:16px;border-radius:8px;text-align:center;font-weight:700;font-size:16px;margin-top:14px;">🎉 全'+p+'項目合格！リリースOKです</div>'
    :'<div style="background:#fee2e2;color:#ef4444;padding:16px;border-radius:8px;text-align:center;font-weight:700;font-size:16px;margin-top:14px;">⚠️ '+f+'件失敗。修正が必要です</div>';
  document.getElementById("runBtn").disabled=false;
}
renderTests();
<\/script>
</body>
</html>`;
  }

  return (
    <div style={{background:"#f3f4f6",minHeight:"100vh",padding:16,fontFamily:"sans-serif"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{fontWeight:900,fontSize:20,marginBottom:4}}>🛠 SaaSテストページ自動生成</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>情報を入力してテストページを生成します</div>

        {step===1&&(
          <div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12,borderBottom:"1px solid #f3f4f6",paddingBottom:8}}>📝 基本情報</div>
              {[
                {label:"SaaS名",val:saasName,set:setSaasName,ph:"例: KAITAI PRO"},
                {label:"Supabase URL",val:supabaseUrl,set:setSupabaseUrl,ph:"https://xxx.supabase.co"},
                {label:"Supabase Anon Key",val:supabaseKey,set:setSupabaseKey,ph:"eyJ..."},
              ].map((f,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>{f.label}</div>
                  <input value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}
                    style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none"}}/>
                </div>
              ))}
            </div>

            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>✅ ベース項目（{BASE_TESTS.length}件）</div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:10}}>全SaaS共通・変更不要</div>
              {BASE_TESTS.map((t,i)=>(
                <div key={i}>
                  {t.group&&<div style={{fontSize:10,fontWeight:700,color:"#9ca3af",padding:"6px 0 2px"}}>{t.group}</div>}
                  <div style={{fontSize:12,padding:"5px 0",borderBottom:"1px solid #f9fafb",color:"#374151"}}>✓ {t.label}</div>
                </div>
              ))}
            </div>

            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>🎯 固有テスト項目</div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>このSaaS専用のテスト項目を追加してください</div>
              {customTests.map((t,i)=>(
                <div key={t.id} style={{marginBottom:10,padding:10,background:"#f9fafb",borderRadius:6}}>
                  <div style={{display:"flex",gap:8,marginBottom:6}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>グループ名（任意）</div>
                      <input value={t.group} onChange={e=>updateTest(t.id,"group",e.target.value)}
                        placeholder="例: 📄 案件管理"
                        style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"6px 8px",fontSize:12,outline:"none",marginBottom:0}}/>
                    </div>
                    <button onClick={()=>removeTest(t.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,alignSelf:"flex-end",paddingBottom:2}}>×</button>
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>テスト項目名</div>
                  <input value={t.label} onChange={e=>updateTest(t.id,"label",e.target.value)}
                    placeholder="例: 案件を新規作成できる"
                    style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"6px 8px",fontSize:12,outline:"none",marginBottom:0}}/>
                </div>
              ))}
              <button onClick={addTest}
                style={{background:"none",border:"1px dashed #d1d5db",borderRadius:6,color:"#6b7280",fontSize:12,padding:"8px",cursor:"pointer",width:"100%"}}>
                ＋ 項目を追加
              </button>
            </div>

            <button onClick={()=>{
              if(!saasName||!supabaseUrl||!supabaseKey){alert("SaaS名・URL・Keyを入力してください");return;}
              setStep(2);
            }} style={{background:AC,color:"#fff",border:"none",padding:13,borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>
              📄 テストページを生成する
            </button>
          </div>
        )}

        {step===2&&(
          <div>
            <div style={{background:"#dcfce7",border:"1px solid #bbf7d0",borderRadius:8,padding:16,marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#16a34a",marginBottom:4}}>🎉 テストページが完成しました！</div>
              <div style={{fontSize:12,color:"#16a34a"}}>ベース{BASE_TESTS.length}項目 ＋ 固有{validCustomTests.length}項目 = 合計{allTests.length}項目</div>
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📋 全テスト項目</div>
              {allTests.map((t,i)=>(
                <div key={i}>
                  {t.group&&<div style={{fontSize:10,fontWeight:700,color:"#9ca3af",padding:"6px 0 2px"}}>{t.group}</div>}
                  <div style={{fontSize:12,padding:"4px 0",color:"#374151",borderBottom:"1px solid #f9fafb"}}>
                    <span style={{color:t.id.startsWith("c")?AC:"#16a34a",fontWeight:700,marginRight:6}}>{t.id.startsWith("c")?"★":"✓"}</span>
                    {t.label}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>{
              const code=generateHTML();
              const blob=new Blob([code],{type:"text/html"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;a.download=saasName.replace(/\s/g,"_")+"_test.html";a.click();
            }} style={{background:AC,color:"#fff",border:"none",padding:13,borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}}>
              ⬇️ テストページをダウンロード
            </button>
            <button onClick={()=>setStep(1)}
              style={{background:"#fff",border:"1px solid #d1d5db",color:"#374151",padding:12,borderRadius:6,fontSize:13,cursor:"pointer",width:"100%"}}>
              ← 戻って編集する
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
