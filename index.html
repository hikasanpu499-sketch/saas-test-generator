<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SaaSテスター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',sans-serif;background:#f3f4f6;padding:16px;}
input,button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const AC = "#c84b00";

const TESTS = [
  {group:"👤 管理者登録",id:"b01",label:"管理者アカウントの新規登録"},
  {id:"b02",label:"会社レコードが作成される"},
  {id:"b03",label:"管理者がmembersにcompany_id付きで登録される（重複なし）"},
  {id:"b04",label:"company_settingsに会社情報が初期保存される"},
  {group:"💾 設定保存",id:"b05",label:"会社情報を保存できる"},
  {id:"b06",label:"ログアウト後も設定データがDBに残っている"},
  {id:"b07",label:"再ログイン後に設定が正しく読み込まれる"},
  {id:"b08",label:"別アカウントでログインしたとき前のデータが表示されない"},
  {group:"🔑 招待コード・スタッフ",id:"b09",label:"招待コードを発行できる"},
  {id:"b10",label:"スタッフアカウントを招待コードで登録できる"},
  {id:"b11",label:"スタッフが正しいcompany_idで登録されている"},
  {id:"b12",label:"スタッフのroleがstaffになっている"},
  {group:"🔒 データ分離（完全テスト）",id:"b13",label:"管理者は自社の設定だけ見える"},
  {id:"b14",label:"別会社Bのデータを作成する"},
  {id:"b15",label:"会社Aから会社Bの設定が見えない"},
  {id:"b16",label:"会社Aから会社Bのメンバーが見えない"},
  {group:"🗑 後片付け",id:"b17",label:"テストデータを全て削除する"},
];

function App(){
  const [supabaseUrl,setSupabaseUrl]=useState("");
  const [supabaseKey,setSupabaseKey]=useState("");
  const [adminEmail,setAdminEmail]=useState("");
  const [adminPass,setAdminPass]=useState("testpass123");
  const [staffEmail,setStaffEmail]=useState("");
  const [staffPass,setStaffPass]=useState("testpass456");
  const [companyName,setCompanyName]=useState("テスト株式会社A");
  const [results,setResults]=useState({});
  const [logs,setLogs]=useState([]);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);

  const passCount=Object.values(results).filter(r=>r==="pass").length;
  const failCount=Object.values(results).filter(r=>r==="fail").length;

  function addLog(msg,type){
    setLogs(p=>[...p,{text:(type==="ok"?"✓ ":type==="error"?"✗ ":type==="warn"?"⚠ ":"  ")+msg,type}]);
  }
  function setStatus(id,status,msg,type){
    setResults(p=>({...p,[id]:status}));
    if(msg)addLog(msg,type||"info");
  }

  const [jwt,setJwt]=useState("");

  async function api(method,path,body,token){
    const useToken=token||jwt||supabaseKey;
    const h={"apikey":supabaseKey,"Authorization":"Bearer "+useToken,"Content-Type":"application/json","Prefer":"return=representation"};
    const res=await fetch(supabaseUrl+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
    const d=await res.json().catch(()=>({}));
    return{data:res.ok?(Array.isArray(d)?d:d):null,error:res.ok?null:d};
  }
  async function authSignUp(e,p){
    const res=await fetch(supabaseUrl+"/auth/v1/signup",{method:"POST",headers:{"apikey":supabaseKey,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
    const d=await res.json();return res.ok?{error:null}:{error:d.error||d};
  }
  async function authSignIn(e,p){
    const res=await fetch(supabaseUrl+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":supabaseKey,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
    const d=await res.json();
    if(res.ok&&d.access_token){setJwt(d.access_token);return{token:d.access_token,error:null};}
    return{token:null,error:d.error_description||"失敗"};
  }

  async function runTests(){
    if(!supabaseUrl||!supabaseKey){alert("Supabase URLとKeyを入力してください");return;}
    if(!adminEmail||!staffEmail){alert("メールアドレスを入力してください");return;}
    if(adminEmail===staffEmail){alert("管理者とスタッフは別のアドレスにしてください");return;}
    setRunning(true);setDone(false);setResults({});setLogs([]);
    addLog("=== テスト開始 ===");
    let cid=null, cidB=null;

    // B01 管理者登録
    setStatus("b01","running");
    const{data:ec}=await api("GET","/rest/v1/companies?owner_email=eq."+adminEmail+"&select=id");
    if(ec&&ec.length>0){setStatus("b01","fail","このメールはすでに登録済みです。別のアドレスを使ってください","error");setRunning(false);return;}
    const{error:se}=await authSignUp(adminEmail,adminPass);
    if(se){setStatus("b01","fail","登録失敗: "+JSON.stringify(se),"error");setRunning(false);return;}
    setStatus("b01","pass","管理者登録成功","ok");

    // B02 会社作成
    setStatus("b02","running");
    const{data:co,error:ce}=await api("POST","/rest/v1/companies",{name:companyName,owner_email:adminEmail,plan:"standard"});
    if(ce||!co){setStatus("b02","fail","会社作成失敗: "+JSON.stringify(ce),"error");setRunning(false);return;}
    cid=Array.isArray(co)?co[0].id:co.id;
    setStatus("b02","pass","会社作成成功 id="+cid,"ok");

    // B03 members登録（重複なし確認）
    setStatus("b03","running");
    // 先にログインしてJWTを取得（RLS用）
    const{token:adminToken,error:preLoginErr}=await authSignIn(adminEmail,adminPass);
    if(preLoginErr){setStatus("b03","fail","ログイン失敗: "+preLoginErr,"error");setRunning(false);return;}
    const{error:me}=await api("POST","/rest/v1/members",{email:adminEmail,role:"admin",company_id:cid,invited_by:adminEmail},adminToken);
    if(me){setStatus("b03","fail","members登録失敗: "+JSON.stringify(me),"error");setRunning(false);return;}
    const{data:ms}=await api("GET","/rest/v1/members?email=eq."+adminEmail+"&select=company_id,role",null,adminToken);
    if(!ms||ms.length===0){setStatus("b03","fail","membersにレコードがありません","error");setRunning(false);return;}
    if(ms.length>1){setStatus("b03","fail","membersに重複レコードがあります（"+ms.length+"件）","error");setRunning(false);return;}
    if(String(ms[0].company_id)!==String(cid)){setStatus("b03","fail","company_id不一致","error");setRunning(false);return;}
    setStatus("b03","pass","membersに1件のみ登録・company_id="+ms[0].company_id+" OK","ok");

    // B04 company_settings初期保存（JWTで認証済みとして保存）
    setStatus("b04","running");
    const{error:cse}=await api("POST","/rest/v1/company_settings",{name:companyName,company_id:cid,tax_rate:10,bank_type:"普通"},adminToken);
    if(cse){setStatus("b04","fail","company_settings初期保存失敗: "+JSON.stringify(cse),"error");setRunning(false);return;}
    const{data:csCheck}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=name",null,adminToken);
    if(!csCheck||csCheck.length===0){setStatus("b04","fail","company_settingsにデータがありません","error");setRunning(false);return;}
    if(csCheck[0].name!==companyName){setStatus("b04","fail","会社名が一致しません","error");setRunning(false);return;}
    setStatus("b04","pass","company_settingsに会社名「"+companyName+"」が保存されました","ok");

    // B05 設定保存
    setStatus("b05","running");
    const{error:sve}=await api("PATCH","/rest/v1/company_settings?company_id=eq."+cid,{zipcode:"123-4567",address:"東京都テスト区",tel:"03-1234-5678",invoice:"T1234567890123",bank_name:"テスト銀行",bank_branch:"テスト支店",bank_no:"1234567",bank_holder:"テスト"},adminToken);
    if(sve){setStatus("b05","fail","設定保存失敗: "+JSON.stringify(sve),"error");setRunning(false);return;}
    setStatus("b05","pass","設定保存成功","ok");

    // B06 ログアウト後もデータが残る
    setStatus("b06","running");
    const{data:sc}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=name,zipcode",null,adminToken);
    if(!sc||sc.length===0||sc[0].name!==companyName){setStatus("b06","fail","データが消えています","error");setRunning(false);return;}
    setStatus("b06","pass","DBにデータ残存OK","ok");

    // B07 再ログイン
    setStatus("b07","running");
    const{token:reToken,error:le}=await authSignIn(adminEmail,adminPass);
    if(le){setStatus("b07","fail","再ログイン失敗: "+le,"error");setRunning(false);return;}
    const{data:rl}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=name",null,reToken);
    if(!rl||rl.length===0||rl[0].name!==companyName){setStatus("b07","fail","再ログイン後に設定が読み込めません","error");setRunning(false);return;}
    setStatus("b07","pass","再ログイン後も設定読み込みOK","ok");

    // B08 別アカウントのデータが表示されない（state分離確認）
    setStatus("b08","running");
    const{data:otherCs}=await api("GET","/rest/v1/company_settings?company_id=neq."+cid+"&select=company_id&limit=1",null,reToken);
    if(otherCs&&otherCs.length>0){
      setStatus("b08","warn","他社データがDBに存在します。RLSが正しく設定されているか確認してください","warn");
    }else{
      setStatus("b08","pass","他社データなし・分離OK","ok");
    }

    // B09 招待コード発行
    setStatus("b09","running");
    const ic="STAFF-TEST1";
    const{error:ice}=await api("POST","/rest/v1/invite_codes",{code:ic,role:"staff",used:false,created_by:adminEmail,company_id:cid},adminToken);
    if(ice){setStatus("b09","fail","招待コード発行失敗: "+JSON.stringify(ice),"error");setRunning(false);return;}
    setStatus("b09","pass","招待コード発行成功","ok");

    // B10 スタッフ登録
    setStatus("b10","running");
    const{error:sse}=await authSignUp(staffEmail,staffPass);
    if(sse){setStatus("b10","fail","スタッフ登録失敗: "+JSON.stringify(sse),"error");setRunning(false);return;}
    const{token:staffToken}=await authSignIn(staffEmail,staffPass);
    const{data:cd}=await api("GET","/rest/v1/invite_codes?code=eq."+ic+"&select=*",null,adminToken);
    const codeData=cd&&cd[0];
    if(!codeData){setStatus("b10","fail","招待コードが取得できません","error");setRunning(false);return;}
    const{error:sme}=await api("POST","/rest/v1/members",{email:staffEmail,role:codeData.role,company_id:codeData.company_id,invited_by:codeData.created_by},staffToken);
    if(sme){setStatus("b10","fail","スタッフmembers登録失敗: "+JSON.stringify(sme),"error");setRunning(false);return;}
    setStatus("b10","pass","スタッフ登録成功","ok");

    // B11 スタッフのcompany_id確認
    setStatus("b11","running");
    const{data:sm}=await api("GET","/rest/v1/members?email=eq."+staffEmail+"&select=company_id,role",null,staffToken);
    const staffMem=sm&&sm[0];
    if(!staffMem){setStatus("b11","fail","スタッフのmembersレコードが取得できません","error");setRunning(false);return;}
    if(String(staffMem.company_id)!==String(cid)){setStatus("b11","fail","スタッフのcompany_id不正: "+staffMem.company_id+" (期待値: "+cid+")","error");setRunning(false);return;}
    setStatus("b11","pass","スタッフcompany_id="+staffMem.company_id+" OK","ok");

    // B12 スタッフのrole確認
    setStatus("b12","running");
    if(staffMem.role!=="staff"){setStatus("b12","fail","roleが'staff'ではありません: "+staffMem.role,"error");setRunning(false);return;}
    setStatus("b12","pass","スタッフrole=staff OK","ok");

    // B13 管理者は自社設定だけ見える
    setStatus("b13","running");
    const{data:mys}=await api("GET","/rest/v1/company_settings?company_id=eq."+cid+"&select=*",null,adminToken);
    if(!mys||mys.length===0){setStatus("b13","fail","自社設定が読み込めません","error");setRunning(false);return;}
    setStatus("b13","pass","自社設定のみ取得OK","ok");

    // B14 別会社Bを作成（anon keyで直接insert）
    setStatus("b14","running");
    const companyBEmail="testB_"+Date.now()+"@test.com";
    const{data:coB,error:ceBErr}=await api("POST","/rest/v1/companies",{name:"テスト会社B",owner_email:companyBEmail,plan:"standard"});
    if(ceBErr||!coB){setStatus("b14","fail","会社B作成失敗","error");setRunning(false);return;}
    cidB=Array.isArray(coB)?coB[0].id:coB.id;
    await api("POST","/rest/v1/company_settings",{name:"会社Bの設定",company_id:cidB,tax_rate:10,bank_type:"普通"});
    await api("POST","/rest/v1/members",{email:companyBEmail,role:"admin",company_id:cidB,invited_by:companyBEmail});
    setStatus("b14","pass","別会社Bのデータ作成成功 id="+cidB,"ok");

    // B15 会社AからBの設定が見えない（adminTokenで確認）
    setStatus("b15","running");
    const{data:crossCheck}=await api("GET","/rest/v1/company_settings?company_id=eq."+cidB+"&select=company_id",null,adminToken);
    const leaked=crossCheck&&crossCheck.length>0;
    if(leaked){setStatus("b15","fail","会社Aから会社Bの設定が見えています！データが混ざっています","error");setRunning(false);return;}
    setStatus("b15","pass","会社Aから会社Bの設定は見えない ✓","ok");

    // B16 会社AからBのメンバーが見えない
    setStatus("b16","running");
    const{data:memberCrossCheck}=await api("GET","/rest/v1/members?email=eq."+companyBEmail+"&select=company_id",null,adminToken);
    const memberLeaked=memberCrossCheck&&memberCrossCheck.length>0;
    if(memberLeaked){setStatus("b16","fail","会社Aから会社Bのメンバーが見えています","error");setRunning(false);return;}
    setStatus("b16","pass","会社Aから会社Bのメンバーは見えない ✓","ok");

    // B17 後片付け（anon keyで削除）
    setStatus("b17","running");
    await api("DELETE","/rest/v1/company_settings?company_id=eq."+cid);
    await api("DELETE","/rest/v1/company_settings?company_id=eq."+cidB);
    await api("DELETE","/rest/v1/invite_codes?company_id=eq."+cid);
    await api("DELETE","/rest/v1/members?email=eq."+adminEmail);
    await api("DELETE","/rest/v1/members?email=eq."+staffEmail);
    await api("DELETE","/rest/v1/members?email=eq."+companyBEmail);
    await api("DELETE","/rest/v1/companies?id=eq."+cid);
    await api("DELETE","/rest/v1/companies?id=eq."+cidB);
    setStatus("b17","pass","テストデータ全削除完了","ok");

    addLog("\n=== テスト完了 ===");
    setRunning(false);setDone(true);
  }

  return (
    <div style={{background:"#f3f4f6",minHeight:"100vh",padding:16,fontFamily:"sans-serif"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{fontWeight:900,fontSize:20,marginBottom:4}}>🧪 SaaSテスター</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>情報を入力してテストを実行してください</div>

        <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,borderBottom:"1px solid #f3f4f6",paddingBottom:8}}>⚙️ テスト設定</div>
          <div style={{fontSize:11,color:"#ef4444",marginBottom:12}}>⚠️ 毎回違うメールアドレスを使ってください</div>
          {[
            {label:"Supabase URL",val:supabaseUrl,set:setSupabaseUrl,ph:"https://xxx.supabase.co"},
            {label:"Supabase Anon Key",val:supabaseKey,set:setSupabaseKey,ph:"eyJ..."},
            {label:"管理者テスト用メール",val:adminEmail,set:setAdminEmail,ph:"test_admin_001@test.com"},
            {label:"管理者パスワード",val:adminPass,set:setAdminPass,type:"password"},
            {label:"スタッフテスト用メール",val:staffEmail,set:setStaffEmail,ph:"test_staff_001@test.com"},
            {label:"スタッフパスワード",val:staffPass,set:setStaffPass,type:"password"},
            {label:"テスト用会社名",val:companyName,set:setCompanyName},
          ].map((f,i)=>(
            <div key={i} style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>{f.label}</div>
              <input type={f.type||"text"} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph||""}
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:0}}/>
            </div>
          ))}
        </div>

        {Object.keys(results).length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            {[
              {n:passCount,label:"✅ 合格",bg:"#dcfce7",c:"#16a34a"},
              {n:failCount,label:"❌ 失敗",bg:"#fee2e2",c:"#ef4444"},
              {n:Object.keys(results).length,label:"合計",bg:"#f3f4f6",c:"#6b7280"},
            ].map((s,i)=>(
              <div key={i} style={{background:s.bg,borderRadius:8,padding:12,textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:s.c}}>{s.n}</div>
                <div style={{fontSize:11,color:s.c}}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,borderBottom:"1px solid #f3f4f6",paddingBottom:8}}>📋 テスト項目（{TESTS.length}項目）</div>
          {TESTS.map((t,i)=>(
            <div key={i}>
              {t.group&&<div style={{fontSize:10,fontWeight:700,color:"#9ca3af",padding:"8px 0 3px",letterSpacing:".08em"}}>{t.group}</div>}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f9fafb",fontSize:13}}>
                <div style={{
                  width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,
                  background:results[t.id]==="pass"?"#dcfce7":results[t.id]==="fail"?"#fee2e2":results[t.id]==="running"?"#fef3c7":results[t.id]==="warn"?"#fffbeb":"#f3f4f6",
                  color:results[t.id]==="pass"?"#16a34a":results[t.id]==="fail"?"#ef4444":results[t.id]==="running"?"#d97706":results[t.id]==="warn"?"#d97706":"#9ca3af",
                }}>
                  {results[t.id]==="pass"?"✓":results[t.id]==="fail"?"✗":results[t.id]==="running"?"…":results[t.id]==="warn"?"⚠":"–"}
                </div>
                <span>{t.label}</span>
              </div>
            </div>
          ))}
        </div>

        <button onClick={runTests} disabled={running}
          style={{background:AC,color:"#fff",border:"none",padding:13,borderRadius:6,fontSize:14,fontWeight:700,cursor:running?"not-allowed":"pointer",width:"100%",opacity:running?.6:1,marginBottom:10}}>
          {running?"テスト実行中...":"▶ テストを実行する"}
        </button>

        {done&&(
          <div style={{background:failCount===0?"#dcfce7":"#fee2e2",color:failCount===0?"#16a34a":"#ef4444",borderRadius:8,padding:16,textAlign:"center",fontWeight:700,fontSize:16,marginBottom:14}}>
            {failCount===0?`🎉 全${passCount}項目合格！リリースOKです`:`⚠️ ${failCount}件失敗。修正が必要です`}
          </div>
        )}

        {logs.length>0&&(
          <div style={{background:"#111",padding:14,borderRadius:8,fontSize:11,fontFamily:"monospace",maxHeight:220,overflowY:"auto",lineHeight:1.7,marginBottom:16}}>
            {logs.map((l,i)=>(
              <div key={i} style={{color:l.type==="error"?"#ef4444":l.type==="ok"?"#60a5fa":l.type==="warn"?"#f59e0b":"#10b981"}}>{l.text}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
